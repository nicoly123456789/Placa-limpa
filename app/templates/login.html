<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

{% if erro %}
<p style="color:red">{{ erro }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Usuário"><br><br>
    <input type="password" name="password" placeholder="Senha"><br><br>

    <button type="submit">Entrar</button>
</form>

</body>
</html>
